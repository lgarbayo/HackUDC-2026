<div
  class="result-card"
  (click)="onClick()"
  role="button"
  tabindex="0"
  (keydown.enter)="onClick()"
  [attr.aria-label]="result.document.title"
>
  <div class="card-header">
    <div class="card-meta">
      <span class="doc-type">{{ result.document.type | uppercase }}</span>
      <span class="doc-title">{{ result.document.title }}</span>
    </div>
    <div class="score-badge" [title]="'Relevance: ' + scorePercent + '%'">
      {{ scorePercent }}%
    </div>
  </div>

  <p class="fragment" [innerHTML]="getHighlightedHtml()"></p>

  <div class="card-footer">
    <span class="author" *ngIf="result.document.author">
      {{ result.document.author }}
    </span>
    <span class="date">{{ result.document.updatedAt | date : 'mediumDate' }}</span>
    <div class="tags" *ngIf="result.document.tags.length">
      <span class="tag" *ngFor="let tag of result.document.tags">{{ tag }}</span>
    </div>
  </div>
</div>
