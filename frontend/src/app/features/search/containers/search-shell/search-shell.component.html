<ion-content class="search-shell-content">
  <div class="shell-layout" [class.shell-layout--results]="hasSearched">

    <!-- ── Search Section ───────────────────────────────────────── -->
    <section class="search-section">

      <div class="app-title" *ngIf="!hasSearched">
        <span class="title-main">meiga</span>
        <span class="title-accent">search</span>
      </div>

      <div class="search-bar-row">
        <app-search-bar
          [query]="query"
          [isLoading]="(isLoading$ | async) === true"
          (queryChange)="onQueryChange($event)"
          (searchSubmit)="onSearchSubmit($event)"
        >
          <app-search-mode-toggle
            [activeMode]="activeMode"
            (modeChange)="onModeChange($event)"
          ></app-search-mode-toggle>
        </app-search-bar>
      </div>

      <div class="chips-wrapper">
        <app-filter-chips
          [chips]="chips"
          [activeFilters]="activeFilters"
          (filterToggle)="onFilterToggle($event)"
        ></app-filter-chips>
      </div>

    </section>

    <!-- ── Results Section ──────────────────────────────────────── -->
    <section class="results-section" *ngIf="hasSearched">

      <!-- Loading spinner -->
      <div class="loading-state" *ngIf="isLoading$ | async">
        <ion-spinner name="dots"></ion-spinner>
      </div>

      <!-- Error banner -->
      <div class="error-state" *ngIf="error$ | async as errorMsg">
        <ion-icon name="warning-outline"></ion-icon>
        <p>{{ errorMsg }}</p>
      </div>

      <!-- Results list -->
      <ng-container *ngIf="!(isLoading$ | async) && !(error$ | async)">
        <p class="results-count" *ngIf="totalResults > 0">
          {{ totalResults }} result{{ totalResults !== 1 ? 's' : '' }} found
        </p>

        <div class="results-empty" *ngIf="totalResults === 0">
          <ion-icon name="search-outline"></ion-icon>
          <p>No documents found for <strong>"{{ query }}"</strong></p>
        </div>

        <div class="results-list">
          <app-result-card
            *ngFor="let result of results"
            [result]="result"
            (cardClick)="onCardClick($event)"
          ></app-result-card>
        </div>
      </ng-container>

    </section>

  </div>
</ion-content>
