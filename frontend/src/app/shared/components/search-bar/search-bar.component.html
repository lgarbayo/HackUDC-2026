<div class="search-bar-wrapper">
  <input
    class="search-input"
    type="text"
    [value]="query"
    [disabled]="isLoading"
    (input)="onInput($any($event.target).value)"
    (keydown)="onKeydown($event)"
    placeholder="What document or functionality do you need?"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    aria-label="Search documents"
  />
  <div class="search-bar-actions">
    <ng-content></ng-content>
  </div>
</div>
