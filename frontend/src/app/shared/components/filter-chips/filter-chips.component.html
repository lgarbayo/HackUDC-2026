<div class="chips-row" role="group" aria-label="Filter by document type">
  <button
    *ngFor="let chip of chips"
    class="chip"
    [class.chip--active]="isActive(chip.value)"
    (click)="toggle(chip.value)"
    type="button"
    [attr.aria-pressed]="isActive(chip.value)"
  >
    <ion-icon [name]="chip.iconName"></ion-icon>
    <span>{{ chip.label }}</span>
  </button>
</div>
