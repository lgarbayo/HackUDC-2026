version: "3.9"

services:
  # ─── Redis (Broker + Backend para Celery) ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Qdrant (Vector Database) ───
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI App ───
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app # Hot-reload en desarrollo
      - upload_data:/app/uploads # PDFs subidos
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ─── Celery Worker ───
  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - upload_data:/app/uploads
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  redis_data:
  qdrant_data:
  upload_data:
